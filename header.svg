<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="100%" height="280">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#0B0F19" />
    </linearGradient>

    <!-- Glowing Yellow Stroke Gradient -->
    <linearGradient id="yellowBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FACC15" />
      <stop offset="50%" stop-color="#FFE066" />
      <stop offset="100%" stop-color="#FACC15" />
    </linearGradient>

    <!-- Subtle Background Grid Pattern -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.4" />
      <circle cx="20" cy="20" r="1.5" fill="#334155" opacity="0.5" />
    </pattern>

    <!-- GitHub Octocat Symbol -->
    <g id="octocatIcon">
      <circle cx="0" cy="0" r="45" fill="#FFFFFF" />
      <path transform="translate(-32, -32) scale(0.125)" fill="#0D1117" fill-rule="evenodd" clip-rule="evenodd" d="M256 0C114.64 0 0 114.61 0 256c0 113.09 73.34 209 175.08 242.9 12.8 2.35 17.47-5.56 17.47-12.34 0-6.08-.22-22.18-.35-43.54-71.2 15.49-86.2-34.34-86.2-34.34-11.64-29.57-28.42-37.45-28.42-37.45-23.27-15.84 1.73-15.55 1.73-15.55 25.69 1.81 39.21 26.38 39.21 26.38 22.84 39.12 59.92 27.82 74.5 21.27 2.33-16.54 8.94-27.82 16.25-34.22-56.84-6.43-116.6-28.43-116.6-126.49 0-27.95 10-50.8 26.35-68.69-2.63-6.48-11.42-32.5 2.51-67.75 0 0 21.52-6.88 70.48 26.27 20.44-5.69 42.36-8.53 64.14-8.63 21.78.1 43.7 2.94 64.18 8.63 48.92-33.15 70.39-26.27 70.39-26.27 14 35.25 5.2 61.27 2.56 67.75 16.4 17.9 26.31 40.75 26.31 68.69 0 98.35-59.85 120-116.88 126.32 9.19 7.9 17.38 23.53 17.38 47.41 0 34.22-.31 61.83-.31 70.23 0 6.85 4.61 14.81 17.6 12.31C438.72 464.97 512 369.08 512 256.02 512 114.61 397.36 0 256 0z"/>
    </g>
  </defs>

  <style>
    .title-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 54px;
      font-weight: 700;
      fill: #FFFFFF;
      letter-spacing: -0.5px;
    }
    .subtitle-text {
      font-family: 'Fira Code', 'Courier New', Consolas, Monaco, monospace;
      font-size: 26px;
      font-weight: 500;
      fill: #00E5FF;
      letter-spacing: 0.5px;
    }
  </style>

  <!-- Card Outer Yellow Border & Background -->
  <rect x="8" y="8" width="984" height="264" rx="24" ry="24" fill="url(#bgGradient)" stroke="url(#yellowBorder)" stroke-width="10" />

  <!-- Background Grid Pattern -->
  <rect x="13" y="13" width="974" height="254" rx="20" ry="20" fill="url(#gridPattern)" />

  <!-- Left GitHub Octocat Logo -->
  <g transform="translate(100, 140)">
    <use href="#octocatIcon" />
  </g>

  <!-- Right GitHub Octocat Logo -->
  <g transform="translate(900, 140)">
    <use href="#octocatIcon" />
  </g>

  <!-- Main Title Text -->
  <text x="500" y="135" class="title-text" text-anchor="middle">Hey! I am Aditya</text>

  <!-- Subtitle Text -->
  <text x="500" y="185" class="subtitle-text" text-anchor="middle">AI/ML Engineer &amp; Fullstack Developer</text>
</svg>
