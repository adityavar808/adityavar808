<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="100%" height="280">
  <defs>
    <!-- Background Gradient (Medium Vibrant Blue) -->
    <linearGradient id="puzzleBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>

    <!-- Subtle Jigsaw Puzzle Grid Pattern -->
    <pattern id="puzzlePattern" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 0,50 C 15,50 15,30 25,30 C 35,30 35,50 50,50 C 50,65 30,65 30,75 C 30,85 50,85 50,100 M 50,0 C 50,15 70,15 70,25 C 70,35 50,35 50,50 M 50,50 C 65,50 65,70 75,70 C 85,70 85,50 100,50" fill="none" stroke="#60A5FA" stroke-width="1.5" opacity="0.35" />
      <path d="M 0,0 L 100,0 L 100,100 L 0,100 Z" fill="none" stroke="#93C5FD" stroke-width="0.8" opacity="0.25" />
    </pattern>

    <!-- Octocat Mascot Shadow / Water Puddle -->
    <ellipse id="puddle" cx="0" cy="0" rx="60" ry="16" fill="#7DD3FC" opacity="0.85" />
  </defs>

  <style>
    .title-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 56px;
      font-weight: 700;
      fill: #FFFFFF;
      letter-spacing: -0.5px;
    }
    .subtitle-text {
      font-family: 'Fira Code', 'Courier New', Consolas, Monaco, monospace;
      font-size: 28px;
      font-weight: 600;
      font-style: italic;
      fill: #38BDF8;
      letter-spacing: 0.2px;
    }
  </style>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#puzzleBg)" />

  <!-- Puzzle Pattern Overlay -->
  <rect width="100%" height="100%" fill="url(#puzzlePattern)" />

  <!-- Left Text Section -->
  <text x="65" y="130" class="title-text">Hey! I am Aditya</text>
  <text x="65" y="182" class="subtitle-text">AI/ML Engineer &amp; Fullstack Developer</text>

  <!-- Right Side GitHub Mona Octocat Mascot -->
  <g transform="translate(850, 160)">
    <!-- Water Puddle -->
    <use href="#puddle" y="45" />

    <!-- Cute Octocat Vector Graphic -->
    <!-- Head & Body -->
    <path d="M -35,10 C -45,-15 -35,-45 0,-45 C 35,-45 45,-15 35,10 C 25,35 -25,35 -35,10 Z" fill="#0D1117" />
    <!-- Cat Ears -->
    <polygon points="-30,-35 -42,-58 -18,-43" fill="#0D1117" />
    <polygon points="30,-35 42,-58 18,-43" fill="#0D1117" />
    <polygon points="-28,-36 -37,-52 -20,-42" fill="#FFD1DC" />
    <polygon points="28,-36 37,-52 20,-42" fill="#FFD1DC" />
    
    <!-- Face Plate -->
    <ellipse cx="0" cy="-10" rx="30" ry="22" fill="#FDE8E8" />
    <!-- Eyes -->
    <circle cx="-12" cy="-14" r="5" fill="#6B21A8" />
    <circle cx="12" cy="-14" r="5" fill="#6B21A8" />
    <circle cx="-10" cy="-16" r="2" fill="#FFFFFF" />
    <circle cx="14" cy="-16" r="2" fill="#FFFFFF" />
    <!-- Cute Nose & Mouth -->
    <polygon points="0,-7 -2,-4 2,-4" fill="#F43F5E" />
    <path d="M -4,-2 Q 0,2 4,-2" fill="none" stroke="#9F1239" stroke-width="1.5" stroke-linecap="round" />

    <!-- Tentacles -->
    <path d="M -22,25 C -25,45 -30,50 -25,52 C -20,54 -15,40 -12,28" fill="#0D1117" />
    <path d="M -12,28 C -12,48 -15,55 -10,56 C -5,57 0,42 0,28" fill="#0D1117" />
    <path d="M 0,28 C 0,45 2,55 8,56 C 14,57 12,42 10,28" fill="#0D1117" />
    <path d="M 12,28 C 15,40 22,54 27,52 C 32,50 25,45 22,25" fill="#0D1117" />

    <!-- Tail -->
    <path d="M -30,15 C -55,10 -65,30 -50,35 C -40,38 -35,25 -25,20" fill="none" stroke="#0D1117" stroke-width="7" stroke-linecap="round" />
    <!-- Water Drop from Tail -->
    <circle cx="-56" cy="28" r="2.5" fill="#38BDF8" />
  </g>
</svg>
