<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 230" width="100%" height="230">
  <defs>
    <!-- Terminal Background & Border -->
    <linearGradient id="termBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117" />
      <stop offset="100%" stop-color="#161B22" />
    </linearGradient>
  </defs>

  <style>
    .code-text {
      font-family: 'Fira Code', 'Courier New', Consolas, Monaco, monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .keyword { fill: #FF79C6; font-weight: bold; }
    .class-name { fill: #50FA7B; font-weight: bold; }
    .string { fill: #F1FA8C; }
    .number { fill: #BD93F9; }
    .comment { fill: #6272A4; font-style: italic; }
    .plain { fill: #F8F8F2; }
    .prompt { fill: #00E5FF; font-weight: bold; }
    .cursor {
      fill: #00E5FF;
      animation: blink 0.9s infinite;
    }

    /* Animated Line Reveals */
    @keyframes lineFade {
      0% { opacity: 0; transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .line-1 { animation: lineFade 0.4s ease-out 0.2s forwards; opacity: 0; }
    .line-2 { animation: lineFade 0.4s ease-out 0.6s forwards; opacity: 0; }
    .line-3 { animation: lineFade 0.4s ease-out 1.0s forwards; opacity: 0; }
    .line-4 { animation: lineFade 0.4s ease-out 1.4s forwards; opacity: 0; }
    .line-5 { animation: lineFade 0.4s ease-out 1.8s forwards; opacity: 0; }
    .line-6 { animation: lineFade 0.4s ease-out 2.2s forwards; opacity: 0; }
    .line-7 { animation: lineFade 0.4s ease-out 2.6s forwards; opacity: 0; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <!-- Outer Window Container -->
  <rect width="440" height="230" rx="10" ry="10" fill="url(#termBg)" stroke="#30363D" stroke-width="1.5" />

  <!-- Mac Window Header Bar -->
  <path d="M 0,10 Q 0,0 10,0 L 430,0 Q 440,0 440,10 L 440,32 L 0,32 Z" fill="#161B22" />
  <line x1="0" y1="32" x2="440" y2="32" stroke="#30363D" stroke-width="1" />

  <!-- Mac Window Action Buttons -->
  <circle cx="18" cy="16" r="5.5" fill="#FF5F56" />
  <circle cx="36" cy="16" r="5.5" fill="#FFBD2E" />
  <circle cx="54" cy="16" r="5.5" fill="#27C93F" />

  <!-- Window Header Title -->
  <text x="220" y="20" fill="#8B949E" font-family="-apple-system, sans-serif" font-size="12" text-anchor="middle" font-weight="500">aditya@portfolio: ~/about (python3)</text>

  <!-- Code Body -->
  <g class="code-text" transform="translate(18, 55)">
    <!-- Line 1: Comment -->
    <text y="0" class="line-1">
      <tspan class="comment"># Developer Bio &amp; Engineering Profile</tspan>
    </text>

    <!-- Line 2: Name & Role -->
    <text y="22" class="line-2">
      <tspan class="plain">name = </tspan><tspan class="string">"Aditya Varshney"</tspan>
    </text>

    <!-- Line 3: Role -->
    <text y="44" class="line-3">
      <tspan class="plain">role = </tspan><tspan class="string">"AI / ML Engineer"</tspan>
    </text>

    <!-- Line 4: Core Mission -->
    <text y="66" class="line-4">
      <tspan class="plain">focus = </tspan><tspan class="string">"Computer Vision &amp; LLM Agents"</tspan>
    </text>

    <!-- Line 5: Tech Stack -->
    <text y="88" class="line-5">
      <tspan class="plain">stack = [</tspan><tspan class="string">"PyTorch"</tspan><tspan class="plain">, </tspan><tspan class="string">"OpenCV"</tspan><tspan class="plain">, </tspan><tspan class="string">"CUDA"</tspan><tspan class="plain">]</tspan>
    </text>

    <!-- Line 6: Location -->
    <text y="110" class="line-6">
      <tspan class="plain">status = </tspan><tspan class="string">"🚀 Building High-Impact AI"</tspan>
    </text>

    <!-- Line 7: Execute & Cursor -->
    <text y="132" class="line-7">
      <tspan class="prompt">❯</tspan> <tspan class="plain">aditya.connect(site=</tspan><tspan class="string">"portfolio"</tspan><tspan class="plain">)</tspan><tspan class="cursor">█</tspan>
    </text>
  </g>
</svg>
