<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="120">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00ff66" stroke-width="0.7" stroke-opacity="0.04" />
    </pattern>
  </defs>

  <style>
    .bg {
      fill: #050806;
      stroke: #00ff66;
      stroke-width: 1.5;
      stroke-opacity: 0.45;
    }
    .hud-text {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      fill: #00ff66;
      font-weight: bold;
    }
    .panel-bg {
      fill: #0b110e;
      stroke: #00ff66;
      stroke-width: 1;
      stroke-opacity: 0.15;
    }
    .bar-green {
      fill: #00ff66;
      filter: url(#glow);
      opacity: 0.85;
    }
    
    /* Bouncing Equalizer Animations */
    .eq-bar {
      width: 5px;
      fill: #00ff66;
      filter: url(#glow);
      opacity: 0.85;
      transform-origin: bottom;
    }
    
    .eq1 { animation: eq-bounce-high 1.8s infinite ease-in-out; }
    .eq2 { animation: eq-bounce-low 1.2s infinite ease-in-out; }
    .eq3 { animation: eq-bounce-mid 1.5s infinite ease-in-out; }
    .eq4 { animation: eq-bounce-high 2.0s infinite ease-in-out; }
    .eq5 { animation: eq-bounce-mid 1.1s infinite ease-in-out; }
    .eq6 { animation: eq-bounce-low 1.7s infinite ease-in-out; }

    @keyframes eq-bounce-high {
      0%, 100% { height: 10px; y: 90px; }
      50% { height: 75px; y: 25px; }
    }
    @keyframes eq-bounce-mid {
      0%, 100% { height: 15px; y: 85px; }
      50% { height: 50px; y: 50px; }
    }
    @keyframes eq-bounce-low {
      0%, 100% { height: 8px; y: 92px; }
      50% { height: 30px; y: 70px; }
    }
    
    /* Pulse metrics */
    .pulse-glow { animation: pulse 2s infinite ease-in-out; }
    .blink-fast { animation: blink 0.8s infinite; }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
  </style>

  <!-- Panel Frame -->
  <rect width="800" height="120" rx="8" class="bg" />
  <rect width="800" height="120" rx="8" fill="url(#grid)" />

  <!-- Corner Brackets -->
  <path d="M 2 12 L 2 2 L 12 2" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 798 12 L 798 2 L 788 2" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 2 108 L 2 118 L 12 118" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 798 108 L 798 118 L 788 118" fill="none" stroke="#00ff66" stroke-width="2.5" />

  <!-- Dividers -->
  <line x1="260" y1="15" x2="260" y2="105" stroke="#00ff66" stroke-opacity="0.2" stroke-dasharray="3, 3" />
  <line x1="535" y1="15" x2="535" y2="105" stroke="#00ff66" stroke-opacity="0.2" stroke-dasharray="3, 3" />

  <!-- ================= LEFT: EQUALIZER FREQUENCY MODULE ================= -->
  <g transform="translate(15, 0)">
    <text x="10" y="22" class="hud-text" font-size="9" fill-opacity="0.5">> NEURAL_SPECTRUM_SCANNER</text>
    
    <!-- Audio Frequency Bars -->
    <rect x="10" y="90" class="eq-bar eq1" />
    <rect x="20" y="90" class="eq-bar eq2" />
    <rect x="30" y="90" class="eq-bar eq3" />
    <rect x="40" y="90" class="eq-bar eq4" />
    <rect x="50" y="90" class="eq-bar eq5" />
    <rect x="60" y="90" class="eq-bar eq6" />
    <rect x="70" y="90" class="eq-bar eq2" />
    <rect x="80" y="90" class="eq-bar eq1" />
    <rect x="90" y="90" class="eq-bar eq3" />
    <rect x="100" y="90" class="eq-bar eq5" />
    <rect x="110" y="90" class="eq-bar eq4" />
    <rect x="120" y="90" class="eq-bar eq6" />
    <rect x="130" y="90" class="eq-bar eq1" />
    <rect x="140" y="90" class="eq-bar eq2" />
    <rect x="150" y="90" class="eq-bar eq3" />
    <rect x="160" y="90" class="eq-bar eq5" />
    <rect x="170" y="90" class="eq-bar eq6" />
    <rect x="180" y="90" class="eq-bar eq4" />
    <rect x="190" y="90" class="eq-bar eq2" />
    <rect x="200" y="90" class="eq-bar eq1" />
    <rect x="210" y="90" class="eq-bar eq3" />
    <rect x="220" y="90" class="eq-bar eq5" />
  </g>

  <!-- ================= MIDDLE: CORE RESOURCE ALLOCATIONS ================= -->
  <g transform="translate(280, 0)">
    <text x="0" y="22" class="hud-text" font-size="9" fill-opacity="0.5">> HARDWARE_RESOURCE_MAP</text>

    <!-- Core 01 -->
    <text x="0" y="44" class="hud-text" font-size="10">CORE_01 [ML/DL]:</text>
    <rect x="110" y="34" width="100" height="12" class="panel-bg" rx="2" />
    <rect x="112" y="36" width="80" height="8" class="bar-green" rx="1" />
    <text x="218" y="44" class="hud-text" font-size="10">80%</text>

    <!-- Core 02 -->
    <text x="0" y="66" class="hud-text" font-size="10">CORE_02 [CV]:</text>
    <rect x="110" y="56" width="100" height="12" class="panel-bg" rx="2" />
    <rect x="112" y="58" width="92" height="8" class="bar-green" rx="1" />
    <text x="218" y="66" class="hud-text" font-size="10">92%</text>

    <!-- GPU Core VRAM -->
    <text x="0" y="88" class="hud-text" font-size="10">VRAM ALLOC:</text>
    <rect x="110" y="78" width="100" height="12" class="panel-bg" rx="2" />
    <rect x="112" y="80" width="65" height="8" class="bar-green" rx="1" />
    <text x="218" y="88" class="hud-text" font-size="10">65%</text>
  </g>

  <!-- ================= RIGHT: NETWORK BANDWIDTH SCAN ================= -->
  <g transform="translate(555, 0)">
    <text x="0" y="22" class="hud-text" font-size="9" fill-opacity="0.5">> NETWORK_BANDWIDTH_GRID</text>
    
    <g transform="translate(0, 32)">
      <!-- Stats block -->
      <text x="0" y="12" class="hud-text" font-size="10" fill-opacity="0.6">GATEWAY:</text>
      <text x="75" y="12" class="hud-text" font-size="10">SECURE_TUNNEL</text>
      
      <text x="0" y="28" class="hud-text" font-size="10" fill-opacity="0.6">BANDWIDTH:</text>
      <text x="75" y="28" class="hud-text" font-size="10">IN: 12.8MB/s</text>

      <text x="0" y="44" class="hud-text" font-size="10" fill-opacity="0.6">TUNNEL PING:</text>
      <text x="75" y="44" class="hud-text" font-size="10">8.4 ms</text>
      
      <!-- Bouncing heartbeat pulse -->
      <circle cx="210" cy="24" r="5" fill="#00ff66" class="blink-fast" filter="url(#glow)" />
      <circle cx="210" cy="24" r="9" fill="none" stroke="#00ff66" stroke-width="1" class="pulse-glow" />
      <text x="180" y="46" class="hud-text" font-size="8" fill-opacity="0.5">PING</text>
    </g>
  </g>
</svg>
