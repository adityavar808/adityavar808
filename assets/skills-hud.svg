<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="220">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00ff66" stroke-width="0.7" stroke-opacity="0.05" />
    </pattern>
  </defs>

  <style>
    .bg {
      fill: #060907;
      stroke: #00ff66;
      stroke-width: 1.5;
      stroke-opacity: 0.4;
    }
    .card-bg {
      fill: #0b110e;
      stroke: #00ff66;
      stroke-width: 1;
      stroke-opacity: 0.2;
    }
    .hud-text {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      fill: #00ff66;
      font-weight: bold;
    }
    .module-num {
      font-size: 9px;
      fill: #00ff66;
      fill-opacity: 0.5;
    }
    .module-title {
      font-size: 12px;
      letter-spacing: 1px;
      fill: #ffffff;
      fill-opacity: 0.9;
    }
    .module-status {
      font-size: 9px;
      fill: #00ff66;
      fill-opacity: 0.6;
    }
    .bar-bg {
      fill: #050806;
      stroke: #00ff66;
      stroke-opacity: 0.15;
    }
    .bar-fill {
      fill: #00ff66;
      filter: url(#glow);
      opacity: 0.8;
    }
    .blink {
      animation: blink-anim 1.5s infinite;
    }
    
    /* Dynamic progress bar loading */
    .fill-ml { animation: load-ml 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
    .fill-dl { animation: load-dl 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
    .fill-web { animation: load-web 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
    .fill-cv { animation: load-cv 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
    .fill-dsa { animation: load-dsa 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }

    @keyframes blink-anim {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes load-ml { from { width: 0px; } to { width: 160px; } }
    @keyframes load-dl { from { width: 0px; } to { width: 145px; } }
    @keyframes load-web { from { width: 0px; } to { width: 135px; } }
    @keyframes load-cv { from { width: 0px; } to { width: 150px; } }
    @keyframes load-dsa { from { width: 0px; } to { width: 140px; } }
  </style>

  <!-- Outer frame -->
  <rect width="800" height="220" rx="8" class="bg" />
  <rect width="800" height="220" rx="8" fill="url(#grid)" />

  <!-- Corner decorations -->
  <path d="M 2 15 L 2 2 L 15 2" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 798 15 L 798 2 L 785 2" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 2 205 L 2 218 L 15 218" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 798 205 L 798 218 L 785 218" fill="none" stroke="#00ff66" stroke-width="2.5" />

  <!-- Section Header -->
  <g transform="translate(20, 25)">
    <text class="hud-text" font-size="11" fill-opacity="0.5">> LOADED_SKILL_MODULES // STACK_DIAGNOSTIC</text>
    <line x1="0" y1="8" x2="760" y2="8" stroke="#00ff66" stroke-opacity="0.2" />
  </g>

  <!-- ================= CARD 1: MACHINE LEARNING (Col 1, Row 1) ================= -->
  <g transform="translate(20, 50)">
    <rect width="240" height="65" rx="4" class="card-bg" />
    <path d="M 0 10 L 0 0 L 10 0" fill="none" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.6" />
    <text x="10" y="16" class="hud-text module-num">MOD_01 // SCI_KIT</text>
    <text x="10" y="32" class="hud-text module-title">MACHINE LEARNING</text>
    <text x="10" y="44" class="hud-text module-status">> STATUS: OPTIMIZED</text>
    <!-- Progress bar -->
    <rect x="10" y="50" width="180" height="6" class="bar-bg" rx="1" />
    <rect x="10" y="50" height="6" class="bar-fill fill-ml" rx="1" />
    <text x="200" y="56" class="hud-text blink" font-size="9">90%</text>
  </g>

  <!-- ================= CARD 2: DEEP LEARNING (Col 2, Row 1) ================= -->
  <g transform="translate(280, 50)">
    <rect width="240" height="65" rx="4" class="card-bg" />
    <path d="M 0 10 L 0 0 L 10 0" fill="none" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.6" />
    <text x="10" y="16" class="hud-text module-num">MOD_02 // TENSORFLOW</text>
    <text x="10" y="32" class="hud-text module-title">DEEP LEARNING</text>
    <text x="10" y="44" class="hud-text module-status">> STATUS: COMPILING</text>
    <!-- Progress bar -->
    <rect x="10" y="50" width="180" height="6" class="bar-bg" rx="1" />
    <rect x="10" y="50" height="6" class="bar-fill fill-dl" rx="1" />
    <text x="200" y="56" class="hud-text blink" font-size="9">80%</text>
  </g>

  <!-- ================= CARD 3: WEB DEVELOPMENT (Col 3, Row 1) ================= -->
  <g transform="translate(540, 50)">
    <rect width="240" height="65" rx="4" class="card-bg" />
    <path d="M 0 10 L 0 0 L 10 0" fill="none" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.6" />
    <text x="10" y="16" class="hud-text module-num">MOD_03 // JS_HTML_CSS</text>
    <text x="10" y="32" class="hud-text module-title">WEB DEVELOPMENT</text>
    <text x="10" y="44" class="hud-text module-status">> STATUS: DEPLOYED</text>
    <!-- Progress bar -->
    <rect x="10" y="50" width="180" height="6" class="bar-bg" rx="1" />
    <rect x="10" y="50" height="6" class="bar-fill fill-web" rx="1" />
    <text x="200" y="56" class="hud-text blink" font-size="9">75%</text>
  </g>

  <!-- ================= CARD 4: COMPUTER VISION (Col 1, Row 2) ================= -->
  <g transform="translate(20, 130)">
    <rect width="365" height="65" rx="4" class="card-bg" />
    <path d="M 0 10 L 0 0 L 10 0" fill="none" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.6" />
    <text x="10" y="16" class="hud-text module-num">MOD_04 // OPENCV_YOLO</text>
    <text x="10" y="32" class="hud-text module-title">COMPUTER VISION (YOLOv8, TRAFFIC_DETECTOR)</text>
    <text x="10" y="44" class="hud-text module-status">> ANALYZING VIDEO FEED... ACTIVE</text>
    <!-- Progress bar -->
    <rect x="10" y="50" width="300" height="6" class="bar-bg" rx="1" />
    <rect x="10" y="50" height="6" class="bar-fill fill-cv" rx="1" />
    <text x="320" y="56" class="hud-text blink" font-size="9">85%</text>
  </g>

  <!-- ================= CARD 5: DSA / JAVA (Col 2, Row 2) ================= -->
  <g transform="translate(415, 130)">
    <rect width="365" height="65" rx="4" class="card-bg" />
    <path d="M 0 10 L 0 0 L 10 0" fill="none" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.6" />
    <text x="10" y="16" class="hud-text module-num">MOD_05 // JAVA_DSA</text>
    <text x="10" y="32" class="hud-text module-title">DATA STRUCTURES &amp; ALGORITHMS</text>
    <text x="10" y="44" class="hud-text module-status">> STACK_OVERFLOW_SHIELD: LOADED</text>
    <!-- Progress bar -->
    <rect x="10" y="50" width="300" height="6" class="bar-bg" rx="1" />
    <rect x="10" y="50" height="6" class="bar-fill fill-dsa" rx="1" />
    <text x="320" y="56" class="hud-text blink" font-size="9">80%</text>
  </g>
</svg>
