<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="280">
  <defs>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00ff66" stroke-width="0.7" stroke-opacity="0.05" />
    </pattern>
  </defs>

  <style>
    .bg {
      fill: #050806;
      stroke: #00ff66;
      stroke-width: 1.5;
      stroke-opacity: 0.45;
    }
    .card {
      fill: #0b110e;
      stroke: #00ff66;
      stroke-width: 1.2;
      stroke-opacity: 0.3;
      transition: stroke-opacity 0.3s;
    }
    .hud-text {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      fill: #00ff66;
      font-weight: bold;
    }
    .core-lbl {
      font-size: 11px;
      fill: #ffffff;
      letter-spacing: 1.5px;
      filter: url(#glow);
    }
    .skill-title {
      font-size: 11px;
      fill: #ffffff;
      fill-opacity: 0.95;
    }
    .skill-sub {
      font-size: 9px;
      fill: #00ff66;
      fill-opacity: 0.6;
    }
    
    /* Base Circuit Traces */
    .circuit-bg {
      fill: none;
      stroke: #00ff66;
      stroke-width: 1.5;
      stroke-opacity: 0.1;
    }
    
    /* Running Pulse Traces */
    .circuit-pulse {
      fill: none;
      stroke: #00ff66;
      stroke-width: 2.5;
      stroke-dasharray: 10, 40;
      filter: url(#glow);
      animation: pulse-flow 2s linear infinite;
    }
    
    .circuit-pulse-delayed {
      fill: none;
      stroke: #00ff66;
      stroke-width: 2.5;
      stroke-dasharray: 10, 40;
      filter: url(#glow);
      animation: pulse-flow 2s linear infinite;
      animation-delay: 1s;
    }

    /* Core Pulsing Glow */
    .core-glow {
      animation: pulse-core 2s ease-in-out infinite;
    }

    @keyframes pulse-flow {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse-core {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.08); opacity: 0.75; }
    }
    .spin-cw { transform-origin: center; animation: spin-cw 25s linear infinite; }
    @keyframes spin-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Panel Frame -->
  <rect width="800" height="280" rx="8" class="bg" />
  <rect width="800" height="280" rx="8" fill="url(#grid)" />

  <!-- Corner Brackets -->
  <path d="M 2 20 L 2 2 L 20 2" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 798 20 L 798 2 L 780 2" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 2 260 L 2 278 L 20 278" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 798 260 L 798 278 L 780 278" fill="none" stroke="#00ff66" stroke-width="2.5" />

  <!-- Title Indicator -->
  <text x="25" y="24" class="hud-text" font-size="10" fill-opacity="0.5">> COGNITIVE_SCHEMATIC // NEURAL_FLOW</text>

  <!-- ================= CIRCUIT LINES (COGNITIVE CORE -> CARDS) ================= -->
  <!-- Center Core = (400, 140) -->
  
  <!-- Left-Top Card Trace: (400,140) -> (140, 75) -->
  <path d="M 400 140 L 320 140 L 260 75 L 240 75" class="circuit-bg" />
  <path d="M 400 140 L 320 140 L 260 75 L 240 75" class="circuit-pulse" />

  <!-- Right-Top Card Trace: (400,140) -> (660, 75) -->
  <path d="M 400 140 L 480 140 L 540 75 L 560 75" class="circuit-bg" />
  <path d="M 400 140 L 480 140 L 540 75 L 560 75" class="circuit-pulse" />

  <!-- Left-Bottom Card Trace: (400,140) -> (140, 205) -->
  <path d="M 400 140 L 320 140 L 260 205 L 240 205" class="circuit-bg" />
  <path d="M 400 140 L 320 140 L 260 205 L 240 205" class="circuit-pulse-delayed" />

  <!-- Right-Bottom Card Trace: (400,140) -> (660, 205) -->
  <path d="M 400 140 L 480 140 L 540 205 L 560 205" class="circuit-bg" />
  <path d="M 400 140 L 480 140 L 540 205 L 560 205" class="circuit-pulse-delayed" />

  <!-- Center-Bottom Card Trace: (400,140) -> (400, 205) -->
  <path d="M 400 140 L 400 205" class="circuit-bg" />
  <path d="M 400 140 L 400 205" class="circuit-pulse" />


  <!-- ================= CENTRAL COGNITIVE CORE (400, 140) ================= -->
  <g transform="translate(400, 140)">
    <!-- Core Pulsing Shield -->
    <circle r="42" fill="none" stroke="#00ff66" stroke-width="1.2" stroke-opacity="0.15" />
    <circle r="36" fill="#00ff66" fill-opacity="0.05" class="core-glow" />
    <circle r="36" fill="none" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="10, 6" class="spin-cw" style="transform-origin: 0px 0px;" />
    
    <!-- Central Active Reactor -->
    <circle r="15" fill="#00ff66" class="core-glow" filter="url(#glow)" />
    <circle r="6" fill="#ffffff" />
    
    <text x="0" y="55" class="hud-text core-lbl" text-anchor="middle" font-size="9">COGNITIVE_CORE</text>
  </g>


  <!-- ================= SKILL MODULE CARDS ================= -->

  <!-- 1. MACHINE LEARNING (Left-Top) -->
  <g transform="translate(25, 40)">
    <rect width="215" height="70" rx="4" class="card" />
    <path d="M 0 12 L 0 0 L 12 0" fill="none" stroke="#00ff66" stroke-width="2" />
    <!-- Telemetry elements inside card -->
    <text x="10" y="16" class="hud-text" font-size="8" fill-opacity="0.4">NODE // ML.ENGINE.01</text>
    <text x="10" y="32" class="hud-text skill-title">MACHINE LEARNING</text>
    <text x="10" y="46" class="hud-text skill-sub">> Scikit-Learn // Data Models</text>
    <text x="10" y="58" class="hud-text" font-size="9" fill="#ffffff">[ STATUS: FULLY_OPTIMIZED ]</text>
    <circle cx="200" cy="15" r="3" fill="#00ff66" />
  </g>

  <!-- 2. DEEP LEARNING (Right-Top) -->
  <g transform="translate(560, 40)">
    <rect width="215" height="70" rx="4" class="card" />
    <path d="M 215 12 L 215 0 L 203 0" fill="none" stroke="#00ff66" stroke-width="2" />
    <text x="10" y="16" class="hud-text" font-size="8" fill-opacity="0.4">NODE // DL.NETWORKS.02</text>
    <text x="10" y="32" class="hud-text skill-title">DEEP LEARNING</text>
    <text x="10" y="46" class="hud-text skill-sub">> PyTorch // TensorFlow // Keras</text>
    <text x="10" y="58" class="hud-text" font-size="9" fill="#ffffff">[ STATUS: AGENT_TRAINING ]</text>
    <circle cx="200" cy="15" r="3" fill="#00ff66" />
  </g>

  <!-- 3. COMPUTER VISION (Left-Bottom) -->
  <g transform="translate(25, 170)">
    <rect width="215" height="70" rx="4" class="card" />
    <path d="M 0 58 L 0 70 L 12 70" fill="none" stroke="#00ff66" stroke-width="2" />
    <text x="10" y="16" class="hud-text" font-size="8" fill-opacity="0.4">NODE // CV.VISION.03</text>
    <text x="10" y="32" class="hud-text skill-title">COMPUTER VISION</text>
    <text x="10" y="46" class="hud-text skill-sub">> YOLOv8 // OpenCV // Tracking</text>
    <text x="10" y="58" class="hud-text" font-size="9" fill="#ffffff">[ STATUS: STREAMING_LIVE ]</text>
    <circle cx="200" cy="15" r="3" fill="#00ff66" />
  </g>

  <!-- 4. DATA STRUCTURES & ALGORITHMS (Right-Bottom) -->
  <g transform="translate(560, 170)">
    <rect width="215" height="70" rx="4" class="card" />
    <path d="M 215 58 L 215 70 L 203 70" fill="none" stroke="#00ff66" stroke-width="2" />
    <text x="10" y="16" class="hud-text" font-size="8" fill-opacity="0.4">NODE // DSA.COMPUTE.04</text>
    <text x="10" y="32" class="hud-text skill-title">DSA &amp; ALGORITHMS</text>
    <text x="10" y="46" class="hud-text skill-sub">> Java // Problem Solving</text>
    <text x="10" y="58" class="hud-text" font-size="9" fill="#ffffff">[ STATUS: COMPILER_READY ]</text>
    <circle cx="200" cy="15" r="3" fill="#00ff66" />
  </g>

  <!-- 5. WEB SYSTEMS (Center-Bottom) -->
  <g transform="translate(292, 205)">
    <rect width="215" height="65" rx="4" class="card" />
    <path d="M 107 65 L 95 65" fill="none" stroke="#00ff66" stroke-width="2" />
    <path d="M 108 65 L 120 65" fill="none" stroke="#00ff66" stroke-width="2" />
    <text x="10" y="14" class="hud-text" font-size="8" fill-opacity="0.4">NODE // WEB.DEPLOYMENT.05</text>
    <text x="10" y="28" class="hud-text skill-title">WEB SYSTEMS &amp; DEV</text>
    <text x="10" y="42" class="hud-text skill-sub">> Javascript // HTML // CSS // API</text>
    <text x="10" y="54" class="hud-text" font-size="9" fill="#ffffff">[ STATUS: CLOUD_DEPLOYED ]</text>
    <circle cx="200" cy="12" r="3" fill="#00ff66" />
  </g>
</svg>
