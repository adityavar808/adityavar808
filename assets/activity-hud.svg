<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="120">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00ff66" stroke-width="0.7" stroke-opacity="0.04" />
    </pattern>

    <clipPath id="graph-clip">
      <rect x="550" y="30" width="220" height="65" />
    </clipPath>
  </defs>

  <style>
    .bg {
      fill: #050806;
      stroke: #00ff66;
      stroke-width: 1.5;
      stroke-opacity: 0.45;
    }
    .hud-text {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      fill: #00ff66;
      font-weight: bold;
    }
    
    /* Contribution blocks */
    .c-none { fill: #0a110d; }
    .c-low { fill: #00441b; }
    .c-mid { fill: #006b2b; }
    .c-high { fill: #00a33e; }
    .c-peak { fill: #00ff66; filter: url(#glow); opacity: 0.9; }
    
    /* Pulse packet animations */
    .pulse-node { animation: pulse 1.8s infinite ease-in-out; }
    .blink-node { animation: blink 0.5s infinite; }
    
    /* Scanner sweep */
    .sweep {
      animation: sweep-move 4s linear infinite;
    }

    @keyframes sweep-move {
      0% { transform: translateX(0px); opacity: 0.8; }
      85% { opacity: 0.8; }
      100% { transform: translateX(220px); opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
  </style>

  <!-- Frame Background -->
  <rect width="800" height="120" rx="8" class="bg" />
  <rect width="800" height="120" rx="8" fill="url(#grid)" />

  <!-- Corner Brackets -->
  <path d="M 2 12 L 2 2 L 12 2" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 798 12 L 798 2 L 788 2" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 2 108 L 2 118 L 12 118" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 798 108 L 798 118 L 788 118" fill="none" stroke="#00ff66" stroke-width="2.5" />

  <text x="25" y="22" class="hud-text" font-size="9" fill-opacity="0.5">> OMNITRIX_DNA_MATRIX_LOGS</text>

  <!-- Dividers -->
  <line x1="260" y1="15" x2="260" y2="105" stroke="#00ff66" stroke-opacity="0.2" stroke-dasharray="3, 3" />
  <line x1="535" y1="15" x2="535" y2="105" stroke="#00ff66" stroke-opacity="0.2" stroke-dasharray="3, 3" />

