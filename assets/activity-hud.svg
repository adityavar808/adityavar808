    <text x="0" y="22" class="hud-text" font-size="9" fill-opacity="0.5">> DUPLEX_STREAM_TELEMETRY</text>
    
    <g transform="translate(0, 32)">
      <text x="0" y="12" class="hud-text" font-size="10" fill-opacity="0.6">TRANS RATE:</text>
      <text x="105" y="12" class="hud-text" font-size="10">60 FPS // STABLE</text>

      <text x="0" y="28" class="hud-text" font-size="10" fill-opacity="0.6">PACKET DUPLEX:</text>
      <text x="105" y="28" class="hud-text" font-size="10">FULL_ASYNCHRONOUS</text>

      <text x="0" y="44" class="hud-text" font-size="10" fill-opacity="0.6">DATA LOSS:</text>
      <text x="105" y="44" class="hud-text" font-size="10" fill="#00ff66">0.000% // NULL</text>

      <text x="0" y="60" class="hud-text" font-size="10" fill-opacity="0.6">SYS SECURITY:</text>
      <text x="105" y="60" class="hud-text" font-size="10" fill="#ffffff">ENCRYPTED_SHA256</text>
