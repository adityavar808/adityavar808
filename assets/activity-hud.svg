  <!-- ================= RIGHT: HIGH-TECH BUFFER GRAPH ================= -->
  <g>
    <!-- Background Frame for buffer scan -->
    <rect x="550" y="30" width="220" height="65" fill="#000000" fill-opacity="0.5" stroke="#00ff66" stroke-opacity="0.15" rx="3" />
    
    <!-- Grid inside buffer graph -->
