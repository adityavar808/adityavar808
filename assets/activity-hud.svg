    <line x1="550" y1="62" x2="770" y2="62" stroke="#00ff66" stroke-opacity="0.05" />
    <line x1="550" y1="78" x2="770" y2="78" stroke="#00ff66" stroke-opacity="0.05" />

    <!-- Static Area Under Curve Grid representation -->
    <g clip-path="url(#graph-clip)">
      <!-- Peak load history path -->
      <path d="M 550 95 L 565 72 L 580 84 L 595 45 L 610 65 L 625 78 L 640 32 L 655 58 L 670 42 L 685 85 L 700 68 L 715 48 L 730 72 L 745 54 L 760 90 L 770 95" 
            fill="none" stroke="#00ff66" stroke-width="1.8" filter="url(#glow)" />
      
      <!-- Translucent fill under path -->
