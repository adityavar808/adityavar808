<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="260">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00ff66" stroke-width="0.7" stroke-opacity="0.04" />
    </pattern>
  </defs>

  <style>
    .bg {
      fill: #050806;
      stroke: #00ff66;
      stroke-width: 1.5;
      stroke-opacity: 0.45;
    }
    .hud-text {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      fill: #00ff66;
      font-weight: bold;
    }
    .grid-axis {
      stroke: #00ff66;
      stroke-width: 0.8;
      stroke-opacity: 0.25;
    }
    .grid-ring {
      fill: none;
      stroke: #00ff66;
      stroke-width: 0.8;
      stroke-opacity: 0.15;
    }
    .data-poly {
      fill: #00ff66;
      fill-opacity: 0.25;
      stroke: #00ff66;
      stroke-width: 2.2;
      filter: url(#glow);
    }
    .marker-dot {
      fill: #ffffff;
      stroke: #00ff66;
      stroke-width: 1.5;
      filter: url(#glow);
    }
    
    .spin-cw { transform-origin: 400px 130px; animation: orbit-cw 12s linear infinite; }

    @keyframes orbit-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .pulse-glow { animation: pulse 2s infinite ease-in-out; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
  </style>

  <!-- Background Frame -->
  <rect width="800" height="260" rx="8" class="bg" />
  <rect width="800" height="260" rx="8" fill="url(#grid)" />

  <!-- Corner Brackets -->
  <path d="M 2 15 L 2 2 L 15 2" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 798 15 L 798 2 L 785 2" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 2 245 L 2 258 L 15 258" fill="none" stroke="#00ff66" stroke-width="2.5" />
  <path d="M 798 245 L 798 258 L 785 258" fill="none" stroke="#00ff66" stroke-width="2.5" />

  <text x="25" y="24" class="hud-text" font-size="10" fill-opacity="0.5">> OMNITRIX_SPECIES_DIAGNOSTICS // CALIBRATION</text>

  <!-- Panel Dividers -->
  <line x1="220" y1="20" x2="220" y2="240" stroke="#00ff66" stroke-opacity="0.2" stroke-dasharray="4, 4" />
  <line x1="580" y1="20" x2="580" y2="240" stroke="#00ff66" stroke-opacity="0.2" stroke-dasharray="4, 4" />

  <!-- ================= LEFT: NUMERIC PROCESS VALS ================= -->
  <g transform="translate(25, 45)">
    <rect width="170" height="175" fill="#000000" fill-opacity="0.4" stroke="#00ff66" stroke-opacity="0.15" rx="4" />
    <text x="10" y="20" class="hud-text" font-size="10" fill-opacity="0.6">> DNA DIAGNOSTICS:</text>

    <!-- Stat Items -->
    <g transform="translate(10, 45)">
      <text x="0" y="0" class="hud-text" font-size="9" fill-opacity="0.5">DMND DIAG:</text>
      <text x="75" y="0" class="hud-text" font-size="9" fill="#ffffff">9.0 // READY</text>

      <text x="0" y="22" class="hud-text" font-size="9" fill-opacity="0.5">UPGD DIAG:</text>
      <text x="75" y="22" class="hud-text" font-size="9" fill="#ffffff">8.0 // READY</text>

      <text x="0" y="44" class="hud-text" font-size="9" fill-opacity="0.5">EYEG DIAG:</text>
      <text x="75" y="44" class="hud-text" font-size="9" fill="#00ff66">8.5 // ACTIVE</text>

      <text x="0" y="66" class="hud-text" font-size="9" fill-opacity="0.5">GMTR DIAG:</text>
      <text x="75" y="66" class="hud-text" font-size="9" fill="#ffffff">8.0 // READY</text>

      <text x="0" y="88" class="hud-text" font-size="9" fill-opacity="0.5">BRNS DIAG:</text>
      <text x="75" y="88" class="hud-text" font-size="9" fill="#ffffff">7.5 // READY</text>
      
      <path d="M 0 102 L 150 102" stroke="#00ff66" stroke-opacity="0.15" />
      <text x="0" y="115" class="hud-text" font-size="8" fill-opacity="0.5">OMNI_LOCK: SECURE</text>
    </g>
  </g>

  <!-- ================= CENTER: RADAR GRAPH (Center 400, 130) ================= -->
  <g>
    <!-- Compass Rose background tick outlines -->
    <circle cx="400" cy="130" r="95" fill="none" stroke="#00ff66" stroke-width="0.8" stroke-opacity="0.08" stroke-dasharray="10, 6" />
    <circle cx="400" cy="130" r="90" fill="none" stroke="#00ff66" stroke-width="0.6" stroke-opacity="0.1" />

    <!-- Grid Pentagon Rings (R=80, 60, 40, 20) -->
    <!-- R=80 -->
    <polygon points="400,50 476,105.3 447,194.7 353,194.7 324,105.3" class="grid-ring" />
    <!-- R=60 -->
    <polygon points="400,70 457,111.5 435.3,178.5 364.7,178.5 343,111.5" class="grid-ring" />
    <!-- R=40 -->
    <polygon points="400,90 438,117.6 423.5,162.4 376.5,162.4 362,117.6" class="grid-ring" />
    <!-- R=20 -->
    <polygon points="400,110 419,123.8 411.8,146.2 388.2,146.2 381,123.8" class="grid-ring" />

    <!-- Axes connecting center to R=80 corners -->
    <line x1="400" y1="130" x2="400" y2="50" class="grid-axis" />
    <line x1="400" y1="130" x2="476" y2="105.3" class="grid-axis" />
    <line x1="400" y1="130" x2="447" y2="194.7" class="grid-axis" />
    <line x1="400" y1="130" x2="353" y2="194.7" class="grid-axis" />
    <line x1="400" y1="130" x2="324" y2="105.3" class="grid-axis" />

    <!-- Radar Sweep Effect -->
    <g class="spin-cw">
      <line x1="400" y1="130" x2="400" y2="40" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.3" filter="url(#glow)" />
      <polygon points="400,130 400,40 430,45" fill="#00ff66" fill-opacity="0.05" />
    </g>

    <!-- DATA POLYGON (ML:90%, DL:80%, DSA:80%, Web:75%, CV:85%) -->
    <polygon points="400,58 460.9,110.2 437.6,181.8 364.7,178.5 335.3,109.0" class="data-poly" />
    
    <!-- Data Points Dots -->
    <circle cx="400" cy="58" r="3.5" class="marker-dot" />
    <circle cx="460.9" cy="110.2" r="3.5" class="marker-dot" />
    <circle cx="437.6" cy="181.8" r="3.5" class="marker-dot" />
    <circle cx="364.7" cy="178.5" r="3.5" class="marker-dot" />
    <circle cx="335.3" cy="109" r="3.5" class="marker-dot" />

    <!-- Labels for the axes -->
    <text x="400" y="42" class="hud-text" font-size="9" text-anchor="middle" fill="#ffffff" filter="url(#glow)">DMND</text>
    <text x="492" y="103" class="hud-text" font-size="9" text-anchor="start" fill="#ffffff">UPGD</text>
    <text x="458" y="210" class="hud-text" font-size="9" text-anchor="middle" fill="#ffffff">GMTR</text>
    <text x="342" y="210" class="hud-text" font-size="9" text-anchor="middle" fill="#ffffff">BRNS</text>
    <text x="308" y="103" class="hud-text" font-size="9" text-anchor="end" fill="#ffffff">EYEG</text>
  </g>

  <!-- ================= RIGHT: TELEMETRY & BEACON ================= -->
  <g transform="translate(605, 45)">
    <rect width="170" height="175" fill="#000000" fill-opacity="0.4" stroke="#00ff66" stroke-opacity="0.15" rx="4" />
    
    <!-- Sector diagnostics -->
    <g transform="translate(15, 20)">
      <text x="0" y="10" class="hud-text" font-size="9" fill-opacity="0.5">SECTOR:</text>
      <text x="0" y="24" class="hud-text" font-size="10">OMNITRIX_05</text>
      
      <text x="0" y="48" class="hud-text" font-size="9" fill-opacity="0.5">SYSTEM NODE:</text>
      <text x="0" y="62" class="hud-text" font-size="10">AZMUTH_LOCK</text>
      
      <!-- Bouncing graphic representing data integrity -->
      <text x="0" y="88" class="hud-text" font-size="9" fill-opacity="0.5">DNA MATRIX:</text>
      <text x="0" y="102" class="hud-text" font-size="10" fill="#00ff66">STABLE [OK]</text>
      
      <circle cx="120" cy="130" r="14" fill="none" stroke="#00ff66" stroke-width="1.2" stroke-opacity="0.3" />
      <circle cx="120" cy="130" r="8" fill="none" stroke="#00ff66" stroke-width="1" stroke-dasharray="3, 3" class="spin-cw" style="transform-origin: 120px 130px;" />
      <circle cx="120" cy="130" r="3.5" fill="#00ff66" class="pulse-glow" filter="url(#glow)" />
      <text x="0" y="134" class="hud-text" font-size="9" fill-opacity="0.4">OMNI_STATUS</text>
    </g>
  </g>
</svg>
