<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="300">
  <defs>
    <!-- Glowing green filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern Background -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00ff66" stroke-width="0.7" stroke-opacity="0.08" />
    </pattern>

    <!-- Oscilloscope Screen Clipping -->
    <clipPath id="osc-clip">
      <rect x="0" y="0" width="240" height="80" rx="3" />
    </clipPath>
  </defs>

  <style>
    /* Global styles and typography */
    .bg {
      fill: #050806;
      stroke: #00ff66;
      stroke-width: 1.5;
      stroke-opacity: 0.45;
    }
    .hud-text {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      fill: #00ff66;
      font-weight: bold;
    }
    .hud-title {
      font-size: 26px;
      letter-spacing: 3px;
      filter: url(#glow);
      animation: glitch 5s infinite;
    }
    .hud-subtitle {
      font-size: 13px;
      letter-spacing: 1px;
      fill: #ffffff;
      fill-opacity: 0.95;
    }
    .hud-lbl {
      font-size: 11px;
      fill: #00ff66;
      fill-opacity: 0.55;
    }
    .hud-val {
      font-size: 11px;
      fill: #ffffff;
      fill-opacity: 0.9;
    }
    
    /* Animations */
    .spin-cw { transform-origin: center; animation: spin-cw 20s linear infinite; }
    .spin-ccw { transform-origin: center; animation: spin-ccw 14s linear infinite; }
    .spin-fast { transform-origin: center; animation: spin-cw 3s linear infinite; }
    .pulse-glow { animation: pulse 2s infinite ease-in-out; }
    .blink-fast { animation: blink 0.8s infinite; }
    
    /* Oscilloscope trace animation */
    .ecg-trace {
      stroke: #00ff66;
      stroke-width: 1.5;
      fill: none;
      filter: url(#glow);
      animation: scroll-ecg 3s linear infinite;
    }
    
    /* Log stream animation */
    .scrolling-logs {
      animation: scroll-logs 14s steps(7) infinite;
    }

    @keyframes spin-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-ccw {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.85; }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    @keyframes scroll-ecg {
      from { transform: translateX(0px); }
      to { transform: translateX(-140px); }
    }
    @keyframes scroll-logs {
      0%, 12% { transform: translateY(0px); }
      14.2%, 26.2% { transform: translateY(-18px); }
      28.5%, 40.5% { transform: translateY(-36px); }
      42.8%, 54.8% { transform: translateY(-54px); }
      57.1%, 69.1% { transform: translateY(-72px); }
      81.4%, 93.4% { transform: translateY(-90px); }
      100% { transform: translateY(-108px); }
    }
    @keyframes glitch {
      0%, 94%, 100% { transform: translate(0) skew(0deg); }
      95% { transform: translate(-3px, 1px) skew(-8deg); filter: hue-rotate(60deg); }
      96% { transform: translate(4px, -2px) skew(5deg); }
      97% { transform: translate(-2px, 3px) skew(-3deg); filter: invert(15%); }
      98% { transform: translate(3px, 1px) skew(3deg); }
      99% { transform: translate(-1px, -1px) skew(0deg); }
    }
  </style>

  <!-- Background Layer -->
  <rect width="800" height="300" rx="8" class="bg" />
  <rect width="800" height="300" rx="8" fill="url(#grid)" />

  <!-- Outer Tech Framing -->
  <path d="M 2 30 L 2 2 L 30 2" fill="none" stroke="#00ff66" stroke-width="3" />
  <path d="M 798 30 L 798 2 L 770 2" fill="none" stroke="#00ff66" stroke-width="3" />
  <path d="M 2 270 L 2 298 L 30 298" fill="none" stroke="#00ff66" stroke-width="3" />
  <path d="M 798 270 L 798 298 L 770 298" fill="none" stroke="#00ff66" stroke-width="3" />

  <!-- Tech crosshairs -->
  <line x1="400" y1="2" x2="400" y2="10" stroke="#00ff66" stroke-opacity="0.5" />
  <line x1="400" y1="290" x2="400" y2="298" stroke="#00ff66" stroke-opacity="0.5" />
  <line x1="2" y1="150" x2="10" y2="150" stroke="#00ff66" stroke-opacity="0.5" />
  <line x1="790" y1="150" x2="798" y2="150" stroke="#00ff66" stroke-opacity="0.5" />

  <!-- ================= LEFT PANEL: COGNITIVE HUD SCANNER ================= -->
  <!-- Scanner Center = (90, 150) -->
  <g transform="translate(90, 150)">
    <!-- Radar ring grids -->
    <circle r="75" fill="none" stroke="#00ff66" stroke-width="0.7" stroke-opacity="0.1" />
    <circle r="60" fill="none" stroke="#00ff66" stroke-width="0.7" stroke-opacity="0.15" />
    <circle r="45" fill="none" stroke="#00ff66" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4, 4" />
    
    <!-- Outer Telemetry Ring -->
    <g class="spin-cw">
      <circle r="70" fill="none" stroke="#00ff66" stroke-width="1.5" stroke-dasharray="40, 20, 10, 20" stroke-opacity="0.6" />
      <!-- Small marker dots on the outer rotating ring -->
      <circle cx="70" cy="0" r="2.5" fill="#00ff66" />
      <circle cx="-70" cy="0" r="2.5" fill="#00ff66" />
    </g>

    <!-- Inner Telemetry Ring -->
    <g class="spin-ccw">
      <circle r="52" fill="none" stroke="#00ff66" stroke-width="1" stroke-dasharray="12, 8" stroke-opacity="0.5" />
    </g>

    <!-- Radar sweeper sweeps -->
    <g class="spin-fast">
      <line x1="-40" y1="0" x2="40" y2="0" stroke="#00ff66" stroke-opacity="0.4" />
      <line x1="0" y1="-40" x2="0" y2="40" stroke="#00ff66" stroke-opacity="0.4" />
      <!-- Wedge gradient look simulated via multiple line segments -->
      <line x1="0" y1="0" x2="28" y2="28" stroke="#00ff66" stroke-opacity="0.25" />
      <line x1="0" y1="0" x2="10" y2="38" stroke="#00ff66" stroke-opacity="0.1" />
    </g>

    <!-- Holographic center core -->
    <circle r="8" fill="#00ff66" class="pulse-glow" filter="url(#glow)" />
    <circle r="3" fill="#ffffff" />
    
    <!-- Outer Hexagonal telemetry marker frame -->
    <polygon points="0,-82 71,-41 71,41 0,82 -71,41 -71,-41" fill="none" stroke="#00ff66" stroke-opacity="0.15" stroke-width="1" />
  </g>

  <!-- Core Status indicators underneath scanner -->
  <g transform="translate(45, 255)">
    <!-- Temp bar -->
    <text x="0" y="10" class="hud-text" font-size="9" fill-opacity="0.5">CPU TEMP</text>
    <rect x="50" y="3" width="50" height="6" fill="#050806" stroke="#00ff66" stroke-opacity="0.2" />
    <rect x="50" y="3" width="32" height="6" fill="#00ff66" />
    <text x="106" y="10" class="hud-text" font-size="9">42°C</text>

    <!-- Memory load bar -->
    <text x="0" y="24" class="hud-text" font-size="9" fill-opacity="0.5">MEM LOAD</text>
    <rect x="50" y="17" width="50" height="6" fill="#050806" stroke="#00ff66" stroke-opacity="0.2" />
    <rect x="50" y="17" width="38" height="6" fill="#00ff66" />
    <text x="106" y="24" class="hud-text" font-size="9">76%</text>
  </g>

  <!-- Panel dividers -->
  <line x1="180" y1="20" x2="180" y2="280" stroke="#00ff66" stroke-opacity="0.2" stroke-dasharray="5, 5" />
  <line x1="535" y1="20" x2="535" y2="280" stroke="#00ff66" stroke-opacity="0.2" stroke-dasharray="5, 5" />

  <!-- ================= CENTER PANEL: CORE OVERVIEW IDENTITY ================= -->
  <g transform="translate(200, 0)">
    <!-- Main header block -->
    <text x="0" y="55" class="hud-text hud-title">ADITYA // OMNITRIX_CORE</text>
    
    <!-- Glowing green beacon and status subtitle -->
    <circle cx="5" cy="80" r="3.5" fill="#00ff66" class="blink-fast" filter="url(#glow)" />
    <text x="18" y="84" class="hud-text hud-subtitle">OMNITRIX STATUS: ACTIVE [DNA_SYNCED]</text>

    <!-- Dynamic Identity Spec Board -->
    <g transform="translate(0, 115)">
      <!-- Panel frame background -->
      <rect x="-5" y="0" width="320" height="150" fill="#0b110e" fill-opacity="0.4" stroke="#00ff66" stroke-opacity="0.2" rx="4" />
      
      <!-- Inside Data matrix -->
      <g transform="translate(10, 22)">
        <text x="0" y="0" class="hud-text hud-lbl">OPERATOR:</text>
        <text x="110" y="0" class="hud-text hud-val">ADITYA VARSHNEY</text>
        
        <text x="0" y="20" class="hud-text hud-lbl">NEURAL CLASS:</text>
        <text x="110" y="20" class="hud-text hud-val">OMNITRIX OPERATOR // V10.0</text>

        <text x="0" y="40" class="hud-text hud-lbl">DNA LINK:</text>
        <text x="110" y="40" class="hud-text hud-val">COGNITIVE_LINK // SECURE</text>

        <text x="0" y="60" class="hud-text hud-lbl">PLUMBER NET:</text>
        <text x="110" y="60" class="hud-text hud-val">PORTFOLIO.net [ONLINE]</text>

        <text x="0" y="80" class="hud-text hud-lbl">GALACTIC COORD:</text>
        <text x="110" y="80" class="hud-text hud-val">28.6139° N, 77.2090° E</text>

        <!-- Cryptographic key rotators -->
        <text x="0" y="105" class="hud-text hud-lbl">DNA_SIGNATURE:</text>
        <text x="110" y="105" class="hud-text hud-val" font-size="10" fill="#00ff66" stroke="#00ff66" stroke-width="0.3" fill-opacity="0.6">0x8F59C7D3E2A10B4F</text>
        
        <text x="0" y="120" class="hud-text hud-lbl">CHARGE LEVEL:</text>
        <text x="110" y="120" class="hud-text hud-val">100% FULLY_CHARGED</text>
      </g>
    </g>
  </g>

  <!-- ================= RIGHT PANEL: DIAGNOSTICS FEED & ECG ================= -->
  <!-- Top Right Panel: Oscilloscope ECG -->
  <g transform="translate(550, 25)">
    <text x="0" y="10" class="hud-text" font-size="11" fill-opacity="0.6">> COGNITIVE HEARTBEAT:</text>
    
    <g transform="translate(0, 20)">
      <!-- Oscilloscope Box Grid -->
      <rect width="230" height="80" fill="#000000" fill-opacity="0.6" stroke="#00ff66" stroke-opacity="0.25" rx="4" />
      <!-- Grid lines inside box -->
      <line x1="0" y1="20" x2="230" y2="20" stroke="#00ff66" stroke-opacity="0.05" />
      <line x1="0" y1="40" x2="230" y2="40" stroke="#00ff66" stroke-opacity="0.1" stroke-dasharray="2, 2" />
      <line x1="0" y1="60" x2="230" y2="60" stroke="#00ff66" stroke-opacity="0.05" />
      <line x1="57" y1="0" x2="57" y2="80" stroke="#00ff66" stroke-opacity="0.05" />
      <line x1="115" y1="0" x2="115" y2="80" stroke="#00ff66" stroke-opacity="0.1" stroke-dasharray="2, 2" />
      <line x1="172" y1="0" x2="172" y2="80" stroke="#00ff66" stroke-opacity="0.05" />

      <!-- ECG Wave with clipping mask -->
      <g clip-path="url(#osc-clip)">
        <!-- Double length wave translating leftwards to look infinite -->
        <path class="ecg-trace" d="
          M 0 40 L 40 40 L 45 30 L 50 50 L 55 10 L 60 70 L 65 40 L 70 40 L 105 40 L 110 35 L 115 45 L 120 40 L 140 40
          M 140 40 L 180 40 L 185 30 L 190 50 L 195 10 L 200 70 L 205 40 L 210 40 L 245 40 L 250 35 L 255 45 L 260 40 L 280 40
          M 280 40 L 320 40 L 325 30 L 330 50 L 335 10 L 340 70 L 345 40 L 350 40 L 385 40 L 390 35 L 395 45 L 400 40 L 420 40
        " />
      </g>
    </g>
  </g>

  <!-- Bottom Right Panel: Live Logs -->
  <g transform="translate(550, 145)">
    <text x="0" y="10" class="hud-text" font-size="11" fill-opacity="0.6">> OMNITRIX LOGSTREAM:</text>
    
    <g transform="translate(0, 20)">
      <rect width="230" height="100" fill="#000000" fill-opacity="0.4" stroke="#00ff66" stroke-opacity="0.15" rx="4" />
      
      <!-- Clipping for log content -->
      <clipPath id="log-clip-v2">
        <rect x="5" y="5" width="220" height="90" />
      </clipPath>
      
      <g clip-path="url(#log-clip-v2)">
        <g class="scrolling-logs">
          <text x="8" y="20" class="hud-text" font-size="9" fill="#00ff66" fill-opacity="0.9">> OMNI.BOOT: SCANNING DNA CATALOG</text>
          <text x="8" y="38" class="hud-text" font-size="9" fill="#00ff66" fill-opacity="0.9">> DNA_SYNCED: GITHUB/ADITYAVAR808</text>
          <text x="8" y="56" class="hud-text" font-size="9" fill="#00ff66" fill-opacity="0.9">> ACTIVE_MODEL: XLR8_VISION_PIPELINE</text>
          <text x="8" y="74" class="hud-text" font-size="9" fill="#00ff66" fill-opacity="0.9">> COGNITIVE: AZMUTH_LOGIC_OPTIMIZED</text>
          <text x="8" y="92" class="hud-text" font-size="9" fill="#00ff66" fill-opacity="0.9">> DNA_STREAM: 10_ACTIVE_SPECIES_OK</text>
          <text x="8" y="110" class="hud-text" font-size="9" fill="#00ff66" fill-opacity="0.9">> PLUMBER_NET: NODE_CONNECTED</text>
          <text x="8" y="128" class="hud-text" font-size="9" fill="#00ff66" fill-opacity="0.9">> CODE: GREY_MATTER_DSA_STABLE</text>
          
          <!-- Duplicates for loop -->
          <text x="8" y="146" class="hud-text" font-size="9" fill="#00ff66" fill-opacity="0.9">> OMNI.BOOT: SCANNING DNA CATALOG</text>
          <text x="8" y="164" class="hud-text" font-size="9" fill="#00ff66" fill-opacity="0.9">> DNA_SYNCED: GITHUB/ADITYAVAR808</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Tactical Trim Lines at bottom -->
  <path d="M 195 285 L 210 295 L 485 295 L 500 285" fill="none" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.5" />
  <circle cx="340" cy="295" r="2" fill="#00ff66" class="blink-fast" />
  <circle cx="347" cy="295" r="1.5" fill="#00ff66" />
  <circle cx="333" cy="295" r="1.5" fill="#00ff66" />
</svg>
