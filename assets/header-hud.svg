<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <!-- Sci-fi green glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Grid Pattern Background -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00ff66" stroke-width="0.7" stroke-opacity="0.07" />
    </pattern>
  </defs>

  <style>
    /* Styling and Animations */
    .bg {
      fill: #060907;
      stroke: #00ff66;
      stroke-width: 1.5;
      stroke-opacity: 0.4;
    }
    .hud-text {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      fill: #00ff66;
      font-weight: bold;
    }
    .hud-title {
      font-size: 24px;
      letter-spacing: 3px;
      filter: url(#glow);
      animation: glitch 6s infinite;
    }
    .hud-subtitle {
      font-size: 13px;
      letter-spacing: 1px;
      fill: #00ff66;
      fill-opacity: 0.8;
    }
    .hud-stats-lbl {
      font-size: 11px;
      fill: #00ff66;
      fill-opacity: 0.6;
    }
    .hud-stats-val {
      font-size: 11px;
      fill: #ffffff;
      fill-opacity: 0.9;
    }
    .pulse-glow {
      animation: pulse 2s infinite ease-in-out;
    }
    .blink-fast {
      animation: blink 0.8s infinite;
    }
    
    /* Rotate animations */
    .spin-cw {
      animation: spin-cw 20s linear infinite;
    }
    .spin-ccw {
      animation: spin-ccw 12s linear infinite;
    }
    .spin-fast {
      animation: spin-cw 4s linear infinite;
    }
    
    /* Log scroll animation */
    .scrolling-logs {
      animation: scroll-logs 12s steps(6) infinite;
    }

    @keyframes spin-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-ccw {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    @keyframes glitch {
      0%, 95%, 100% { transform: translate(0) skew(0deg); }
      96% { transform: translate(-2px, 1px) skew(-6deg); filter: hue-rotate(90deg); }
      97% { transform: translate(3px, -2px) skew(4deg); }
      98% { transform: translate(-1px, 2px) skew(-2deg); filter: invert(10%); }
      99% { transform: translate(2px, 1px) skew(2deg); }
    }
    @keyframes scroll-logs {
      0%, 14% { transform: translateY(0px); }
      16.6%, 30.6% { transform: translateY(-18px); }
      33.3%, 47.3% { transform: translateY(-36px); }
      50%, 64% { transform: translateY(-54px); }
      66.6%, 80.6% { transform: translateY(-72px); }
      83.3%, 97.3% { transform: translateY(-90px); }
      100% { transform: translateY(-108px); }
    }
  </style>

  <!-- Outer container with futuristic tech borders -->
  <rect width="800" height="200" rx="8" class="bg" />
  <rect width="800" height="200" rx="8" fill="url(#grid)" />

  <!-- Corner Brackets -->
  <path d="M 2 20 L 2 2 L 20 2" fill="none" stroke="#00ff66" stroke-width="3" />
  <path d="M 798 20 L 798 2 L 780 2" fill="none" stroke="#00ff66" stroke-width="3" />
  <path d="M 2 180 L 2 198 L 20 198" fill="none" stroke="#00ff66" stroke-width="3" />
  <path d="M 798 180 L 798 198 L 780 198" fill="none" stroke="#00ff66" stroke-width="3" />

  <!-- Crosshair elements -->
  <line x1="400" y1="2" x2="400" y2="8" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.6" />
  <line x1="400" y1="192" x2="400" y2="198" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.6" />
  <line x1="2" y1="100" x2="8" y2="100" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.6" />
  <line x1="792" y1="100" x2="798" y2="100" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.6" />

  <!-- ================= LEFT: HOLOGRAPHIC SCANNER (Center 85, 100) ================= -->
  <g transform="translate(85, 100)">
    <!-- Scanner Glow -->
    <circle r="60" fill="none" stroke="#00ff66" stroke-width="1" stroke-opacity="0.1" />
    <circle r="50" fill="none" stroke="#00ff66" stroke-width="1" stroke-opacity="0.2" />
    
    <!-- Outer dash ring spin cw -->
    <g class="spin-cw" style="transform-origin: 0px 0px;">
      <circle r="45" fill="none" stroke="#00ff66" stroke-width="1.5" stroke-dasharray="15, 10, 5, 10" />
    </g>
    
    <!-- Inner dash ring spin ccw -->
    <g class="spin-ccw" style="transform-origin: 0px 0px;">
      <circle r="35" fill="none" stroke="#00ff66" stroke-width="1" stroke-dasharray="8, 6" stroke-opacity="0.7" />
    </g>

    <!-- Scanner Crosshairs (fast rotation) -->
    <g class="spin-fast" style="transform-origin: 0px 0px;">
      <line x1="-25" y1="0" x2="25" y2="0" stroke="#00ff66" stroke-width="1" stroke-opacity="0.5" />
      <line x1="0" y1="-25" x2="0" y2="25" stroke="#00ff66" stroke-width="1" stroke-opacity="0.5" />
    </g>
    
    <!-- Center glowing core -->
    <circle r="6" fill="#00ff66" class="pulse-glow" filter="url(#glow)" />
    <circle r="2" fill="#ffffff" />
  </g>

  <!-- Vert divider -->
  <line x1="165" y1="20" x2="165" y2="180" stroke="#00ff66" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4, 4" />

  <!-- ================= MIDDLE: SYSTEM TITLE & SPECS ================= -->
  <g transform="translate(185, 0)">
    <!-- Title -->
    <text x="0" y="50" class="hud-text hud-title">ADITYA.VARSHNEY // CORE_SYS</text>
    
    <!-- Pulse indicators -->
    <circle cx="5" cy="72" r="3" fill="#00ff66" class="blink-fast" filter="url(#glow)" />
    <text x="18" y="76" class="hud-text hud-subtitle">SYSTEM STATUS: ACTIVE [SYS_OK]</text>
    
    <!-- Tech specs grid -->
    <g transform="translate(0, 105)">
      <!-- Line 1 -->
      <text x="0" y="0" class="hud-text hud-stats-lbl">OPERATOR:</text>
      <text x="90" y="0" class="hud-text hud-stats-val">ADITYA VARSHNEY</text>
      
      <text x="210" y="0" class="hud-text hud-stats-lbl">CLASS:</text>
      <text x="260" y="0" class="hud-text hud-stats-val">AI/ML ENGINEER</text>

      <!-- Line 2 -->
      <text x="0" y="20" class="hud-text hud-stats-lbl">LOCATION:</text>
      <text x="90" y="20" class="hud-text hud-stats-val">EARTH // INDIA</text>
      
      <text x="210" y="20" class="hud-text hud-stats-lbl">BRIDGE:</text>
      <text x="260" y="20" class="hud-text hud-stats-val">NEURAL_NET.01</text>

      <!-- Line 3 -->
      <text x="0" y="40" class="hud-text hud-stats-lbl">METRICS:</text>
      <text x="90" y="40" class="hud-text hud-stats-val">COGNITIVE_OVERLOAD_ENABLED</text>
    </g>
  </g>

  <!-- Vert divider -->
  <line x1="515" y1="20" x2="515" y2="180" stroke="#00ff66" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4, 4" />

  <!-- ================= RIGHT: TELEMETRY LOGS ================= -->
  <g transform="translate(535, 30)">
    <!-- Diagnostics title -->
    <text x="0" y="10" class="hud-text" font-size="11" fill-opacity="0.6">> TELEMETRY FEED:</text>
    
    <!-- Border panel for logs -->
    <rect x="-5" y="20" width="250" height="120" fill="#000000" fill-opacity="0.4" stroke="#00ff66" stroke-opacity="0.15" rx="3" />
    
    <!-- Clipping mask for logs to scroll inside -->
    <clipPath id="log-clip">
      <rect x="0" y="25" width="240" height="110" />
    </clipPath>
    
    <!-- Logs stream -->
    <g clip-path="url(#log-clip)">
      <g class="scrolling-logs">
        <text x="8" y="42" class="hud-text" font-size="10" fill="#00ff66" fill-opacity="0.9">> BOOTING CORE SERVICES... SUCCESS</text>
        <text x="8" y="60" class="hud-text" font-size="10" fill="#00ff66" fill-opacity="0.9">> RUNNING NEURAL SCAN... 100%</text>
        <text x="8" y="78" class="hud-text" font-size="10" fill="#00ff66" fill-opacity="0.9">> RETRIEVING CLASS MODEL... DONE</text>
        <text x="8" y="96" class="hud-text" font-size="10" fill="#00ff66" fill-opacity="0.9">> CONNECTING TO GITHUB CORE... OK</text>
        <text x="8" y="114" class="hud-text" font-size="10" fill="#00ff66" fill-opacity="0.9">> RUNNING TRAFFIC_DETECTOR... ACTIVE</text>
        <text x="8" y="132" class="hud-text" font-size="10" fill="#00ff66" fill-opacity="0.9">> YOLOv8 INSTANCE LOADED... STABLE</text>
        
        <!-- Loop duplicate items to make infinite scroll smooth -->
        <text x="8" y="150" class="hud-text" font-size="10" fill="#00ff66" fill-opacity="0.9">> BOOTING CORE SERVICES... SUCCESS</text>
        <text x="8" y="168" class="hud-text" font-size="10" fill="#00ff66" fill-opacity="0.9">> RUNNING NEURAL SCAN... 100%</text>
      </g>
    </g>
  </g>

  <!-- Horizontal Tech Trim at the bottom -->
  <path d="M 180 180 L 195 190 L 500 190 L 515 180" fill="none" stroke="#00ff66" stroke-width="1.5" stroke-opacity="0.4" />
  <circle cx="347" cy="190" r="2" fill="#00ff66" class="blink-fast" />
  <circle cx="340" cy="190" r="1.5" fill="#00ff66" />
  <circle cx="354" cy="190" r="1.5" fill="#00ff66" />
</svg>
